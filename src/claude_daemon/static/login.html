<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Command Center — Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }
    .login-card {
      width: 420px; max-width: 90vw; padding: 36px 32px;
      border-radius: 14px;
    }
    .login-logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif; font-weight: 700;
      color: #000; font-size: 28px; margin: 0 auto 20px;
      box-shadow: 0 0 24px rgba(0, 200, 255, 0.4);
    }
    .login-title {
      font-family: 'Orbitron', sans-serif; font-size: 18px;
      text-align: center; margin: 0 0 6px; letter-spacing: 2px;
      color: var(--neon-cyan);
    }
    .login-sub {
      text-align: center; font-size: 12px; color: rgba(255,255,255,0.55);
      margin: 0 0 28px;
    }
    .login-field {
      display: block; width: 100%; box-sizing: border-box;
      padding: 12px 14px; margin-bottom: 16px;
      background: rgba(0, 0, 0, 0.35); color: #fff;
      border: 1px solid rgba(0, 200, 255, 0.25); border-radius: 8px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      outline: none;
    }
    .login-field:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 0 2px rgba(0, 200, 255, 0.15);
    }
    .login-btn {
      display: block; width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
      color: #000; font-weight: 700; font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px; border: 0; border-radius: 8px;
      cursor: pointer; font-size: 13px;
    }
    .login-btn:hover { filter: brightness(1.15); }
    .login-hint {
      text-align: center; font-size: 11px; margin-top: 20px;
      color: rgba(255,255,255,0.45); line-height: 1.55;
    }
    .login-hint code {
      font-family: 'JetBrains Mono', monospace;
      color: var(--neon-cyan); background: rgba(0,200,255,0.08);
      padding: 1px 5px; border-radius: 3px;
    }
  </style>
</head>
<body>
  <form class="glass login-card" method="POST" action="/dashboard/login">
    <div class="login-logo">C</div>
    <h1 class="login-title">CLAUDE COMMAND CENTER</h1>
    <p class="login-sub">Enter your daemon API key to continue</p>
    <input class="login-field" type="password" name="key"
           placeholder="API key" autocomplete="off" autofocus required>
    <button class="login-btn" type="submit">UNLOCK</button>
    <p class="login-hint">
      Your key is stored in <code>~/.config/claude-daemon/.env</code><br>
      as <code>CLAUDE_DAEMON_API_KEY</code>. Run
      <code>claude-daemon dashboard-url</code> for a one-click link.
    </p>
  </form>
</body>
</html>
