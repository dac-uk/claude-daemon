# Claude Daemon configuration
# Copy to ~/.config/claude-daemon/config.yaml

daemon:
  log_level: INFO
  # api_enabled: true           # Enable HTTP REST API
  # api_port: 8080              # API port
  # api_key: ""                 # API auth key (or set CLAUDE_DAEMON_API_KEY env var)
  dashboard_enabled: true       # Serve live agent dashboard at http://host:port/ (default: true)
  # api_bind: "0.0.0.0"        # Bind address (0.0.0.0 for LAN/Tailscale/ZeroTier access)
  # agent_hot_reload: true      # Auto-detect agent config file changes (IDENTITY.md, SOUL.md, etc.)
  # agent_reload_interval: 10   # Seconds between file change polls
  # alert_webhook_urls:         # URLs to receive alert POSTs (Slack, PagerDuty, etc.)
  #   - "https://hooks.slack.com/services/T.../B.../xxx"
  #   - "https://your-server.com/webhook/alerts"
  # alert_webhook_timeout: 10   # HTTP timeout for webhook calls (seconds)

claude:
  binary: claude                # Path to Claude Code CLI
  max_concurrent: 3             # Max parallel Claude processes
  max_budget_per_message: 0.50  # USD cost cap per message
  # model: sonnet               # Override default model
  permission_mode: auto         # auto, default, bypassPermissions
  # per_agent_daily_budget: 0.0 # Max USD per agent per day (0 = unlimited)
  # model_fallback_chain:       # Fallback models on rate limit (Opus → Sonnet → Haiku)
  #   - sonnet
  #   - haiku
  # model_retry_delay: 2.0      # Seconds between fallback retries
  # model_max_retries: 2        # Max fallback attempts (0 disables)
  # stream_idle_timeout_ms: 600000  # Idle timeout for streaming responses (default 600s; CLI default is 90s which breaks Opus thinking)

  # MCP Server Pool — tiered auto-enable
  # Zero-config servers are always available. Token-required servers
  # auto-enable when their env vars are set. Disable specific servers:
  # disabled_mcp_servers:
  #   - snowflake
  #   - bigquery

  # Agent settings.json — best practice integration
  # thinking_enabled: true        # Enable extended thinking (alwaysThinkingEnabled)
  # default_effort: ""            # Override effort level (low/medium/high/max, empty = per-task-type)
  # auto_compact_pct: 50          # Auto-compact at this % of context (prevents context degradation)
  # agent_deny_rules:             # Extra deny rules appended to built-in safety defaults
  #   - "Bash(docker rm *)"

  # Managed Agents — Anthropic's hosted agent execution (beta, requires ANTHROPIC_API_KEY)
  # managed_agents_enabled: false  # Set true to route long-running tasks to Managed Agents API
  # managed_agents_task_types:     # Task types routed to Managed Agents (rest use CLI)
  #   - planning                   # Complex planning tasks (Opus, long-running)
  #   - workflow                   # Multi-step build pipelines
  #   - rem_sleep                  # Weekly memory integration
  #   - improvement                # Self-assessment cycles

memory:
  daily_log: true               # Write daily markdown logs
  compaction_threshold: 50000   # Characters before auto-compaction
  max_session_age_hours: 72     # Archive sessions older than this
  dream_enabled: true           # Enable weekly auto-dream consolidation

scheduler:
  update_cron: "0 3 * * *"      # Auto-update check (3 AM daily)
  compaction_cron: "0 4 * * *"  # Memory compaction (4 AM daily)
  dream_cron: "0 5 * * 0"      # Auto-dream (Sunday 5 AM)
  heartbeat_interval: 1800      # Seconds (30 min)

  # Custom scheduled jobs
  custom_jobs: []
  # custom_jobs:
  #   - id: daily_standup
  #     cron: "0 9 * * 1-5"
  #     prompt: "Review recent git commits and write a standup summary"
  #     target_platform: telegram
  #     target_chat_id: "12345678"
  #
  #   - id: weekly_review
  #     cron: "0 17 * * 5"
  #     prompt: "Summarize what we accomplished this week"
  #     target_platform: discord
  #     target_channel_id: "987654321"

integrations:
  telegram:
    enabled: true
    # Token loaded from TELEGRAM_BOT_TOKEN env var
    allowed_user_ids: []          # Empty = allow all (use with caution)
    polling: true                 # true=polling, false=webhook
    # Map Telegram groups/chats to specific agents (chat_id -> agent_name)
    # Messages in these chats go directly to the named agent.
    # agent_channels:
    #   "-1001234567890": "albert"     # Albert's dedicated group
    #   "-1009876543210": "luna"        # Luna's dedicated group

  discord:
    enabled: false
    # Token loaded from DISCORD_BOT_TOKEN env var
    allowed_guild_ids: []
    # Map Discord channels to specific agents (channel_id -> agent_name)
    # agent_channels:
    #   "1234567890123456": "albert"
    #   "9876543210987654": "luna"
    # Channels to receive heartbeat alerts, improvement plans, and system notifications
    # alert_channel_ids:
    #   - "1234567890123456"       # e.g. your #alerts or #agents channel

  paperclip:
    enabled: false
    # URL and API key loaded from env vars
    poll_interval: 5              # Seconds between task polls
